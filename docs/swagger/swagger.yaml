definitions:
  Error:
    properties:
      code:
        example: INVALID_ARGUMENT
        type: string
      message:
        example: invalid request body
        type: string
      meta:
        additionalProperties:
          type: string
        example:
          error: invalid_length
          field: username
        type: object
    type: object
  GetMeOutput:
    properties:
      created_at:
        type: string
      id:
        type: string
      phone:
        type: string
      updated_at:
        type: string
    type: object
  GetMyProfileOutput:
    properties:
      bio:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      headline:
        type: string
      last_name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  LoginInput:
    properties:
      password:
        type: string
      phone:
        type: string
    required:
    - password
    - phone
    type: object
  LoginOutput:
    properties:
      access_token:
        type: string
    type: object
  SaveMyProfileInput:
    properties:
      bio:
        type: string
      email:
        type: string
      first_name:
        type: string
      headline:
        type: string
      last_name:
        type: string
    required:
    - email
    - first_name
    - last_name
    type: object
  SendOtpInput:
    properties:
      phone:
        type: string
    required:
    - phone
    type: object
  VerifyOTPAndRegisterInput:
    properties:
      code:
        type: string
      password:
        type: string
      phone:
        type: string
    required:
    - code
    - password
    - phone
    type: object
  VerifyOTPAndRegisterOutput:
    properties:
      access_token:
        type: string
    type: object
info:
  contact:
    email: support@trueflow.ir
    name: API Support
    url: https://trueflow.ir/support
  description: TrueFlow is a modern human resource management (HRM) platform designed
    to integrate organizational processes, manage teams, control access, and increase
    organizational productivity.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: TrueFlow Api Document
paths:
  /authentication/login:
    post:
      consumes:
      - application/json
      description: Logins the user and returns an access token.
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/LoginOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      summary: Login user
      tags:
      - Authentication
  /authentication/send-otp:
    post:
      consumes:
      - application/json
      description: Sends a one-time password (OTP) to the specified phone number.
      parameters:
      - description: Send OTP request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/SendOtpInput'
      responses:
        "204":
          description: OTP sent successfully
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      summary: Send OTP
      tags:
      - Authentication
  /authentication/verify-otp:
    post:
      consumes:
      - application/json
      description: Verifies OTP, registers the user and returns an access token.
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/VerifyOTPAndRegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/VerifyOTPAndRegisterOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      summary: Register user
      tags:
      - Authentication
  /user/me:
    get:
      description: Returns the authenticated user's profile.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/GetMeOutput'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - User
  /user/me/profile:
    get:
      description: Returns the authenticated user's profile information.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/GetMyProfileOutput'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - BearerAuth: []
      summary: Get current user's profile
      tags:
      - User
    put:
      consumes:
      - application/json
      description: Creates or updates the authenticated user's profile.
      parameters:
      - description: Profile
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/SaveMyProfileInput'
      responses:
        "204":
          description: Profile updated successfully
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - BearerAuth: []
      summary: Create or update current user's profile
      tags:
      - User
securityDefinitions:
  BearerAuth:
    description: Enter the JWT token with the `Bearer ` prefix
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
