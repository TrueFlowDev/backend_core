definitions:
  Error:
    properties:
      code:
        example: INVALID_ARGUMENT
        type: string
      message:
        example: invalid request body
        type: string
      meta:
        additionalProperties:
          type: string
        example:
          error: invalid_length
          field: username
        type: object
    type: object
  SendOtpControllerInput:
    properties:
      phone:
        type: string
    required:
    - phone
    type: object
info:
  contact:
    email: support@trueflow.ir
    name: API Support
    url: https://trueflow.ir/support
  description: TrueFlow is a modern human resource management (HRM) platform designed
    to integrate organizational processes, manage teams, control access, and increase
    organizational productivity.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: TrueFlow Api Document
paths:
  /auth/send-otp:
    post:
      consumes:
      - application/json
      description: Sends a one-time password (OTP) to the specified phone number.
      parameters:
      - description: Send OTP request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/SendOtpControllerInput'
      produces:
      - application/json
      responses:
        "204":
          description: OTP sent successfully
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      summary: Send OTP
      tags:
      - Authentication
securityDefinitions:
  BearerAuth:
    description: Enter the JWT token with the `Bearer ` prefix
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
