definitions:
  CreateOrganizationInput:
    properties:
      category:
        enum:
        - technology
        - finance
        - retail
        - manufacturing
        - other
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      owner_employment_type:
        enum:
        - full_time
        - part_time
        - contract
        type: string
      owner_job_title:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - category
    - name
    - owner_employment_type
    - owner_job_title
    type: object
  CreateOrganizationOutput:
    properties:
      employee_id:
        type: string
      organization_id:
        type: string
      role_id:
        type: string
    type: object
  CreateRoleInput:
    properties:
      permissions:
        items:
          type: string
        minItems: 1
        type: array
      title:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - permissions
    - title
    type: object
  CreateRoleOutput:
    properties:
      id:
        type: string
    type: object
  DashboardOutput:
    properties:
      employee_id:
        type: string
      employment_type:
        type: string
      job_title:
        type: string
      organization_id:
        type: string
      organization_name:
        type: string
      role_id:
        type: string
    type: object
  Error:
    properties:
      code:
        example: INVALID_ARGUMENT
        type: string
      message:
        example: invalid request body
        type: string
      meta:
        additionalProperties:
          type: string
        example:
          error: invalid_length
          field: username
        type: object
    type: object
  GetMeOutput:
    properties:
      created_at:
        type: string
      id:
        type: string
      phone:
        type: string
      updated_at:
        type: string
    type: object
  GetMyProfileOutput:
    properties:
      bio:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      headline:
        type: string
      last_name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  ListPermissionsOutput:
    properties:
      category:
        type: string
      permissions:
        items:
          $ref: '#/definitions/PermissionOutput'
        type: array
    type: object
  LoginInput:
    properties:
      password:
        type: string
      phone:
        type: string
    required:
    - password
    - phone
    type: object
  LoginOutput:
    properties:
      access_token:
        type: string
    type: object
  PermissionOutput:
    properties:
      title:
        type: string
      value:
        type: string
    type: object
  RoleOutput:
    properties:
      id:
        type: string
      is_owner:
        type: boolean
      permissions:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  SaveMyProfileInput:
    properties:
      bio:
        maxLength: 1000
        type: string
      email:
        type: string
      first_name:
        maxLength: 50
        minLength: 2
        type: string
      headline:
        maxLength: 100
        type: string
      last_name:
        maxLength: 50
        minLength: 2
        type: string
    required:
    - email
    - first_name
    - last_name
    type: object
  SendOtpInput:
    properties:
      phone:
        type: string
    required:
    - phone
    type: object
  UpdateRoleInput:
    properties:
      permissions:
        items:
          type: string
        minItems: 1
        type: array
      title:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - permissions
    - title
    type: object
  VerifyOTPAndRegisterInput:
    properties:
      code:
        type: string
      password:
        type: string
      phone:
        type: string
    required:
    - code
    - password
    - phone
    type: object
  VerifyOTPAndRegisterOutput:
    properties:
      access_token:
        type: string
    type: object
info:
  contact:
    email: support@trueflow.ir
    name: API Support
    url: https://trueflow.ir/support
  description: TrueFlow is a modern human resource management (HRM) platform designed
    to integrate organizational processes, manage teams, control access, and increase
    organizational productivity.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: TrueFlow Api Document
paths:
  /authentication/login:
    post:
      consumes:
      - application/json
      description: Logins the user and returns an access token.
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/LoginOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      summary: Login user
      tags:
      - Authentication
  /authentication/send-otp:
    post:
      consumes:
      - application/json
      description: Sends a one-time password (OTP) to the specified phone number.
      parameters:
      - description: Send OTP request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/SendOtpInput'
      responses:
        "204":
          description: OTP sent successfully
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      summary: Send OTP
      tags:
      - Authentication
  /authentication/verify-otp:
    post:
      consumes:
      - application/json
      description: Verifies OTP, registers the user and returns an access token.
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/VerifyOTPAndRegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/VerifyOTPAndRegisterOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      summary: Register user
      tags:
      - Authentication
  /employee/me/dashboards:
    get:
      description: Returns every active organization membership for the authenticated
        user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/DashboardOutput'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - BearerAuth: []
      summary: List my dashboards
      tags:
      - Employee
  /organization:
    post:
      consumes:
      - application/json
      description: Creates a new organization and makes the caller its owner.
      parameters:
      - description: Create organization request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/CreateOrganizationInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/CreateOrganizationOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - BearerAuth: []
      summary: Create organization
      tags:
      - Organization
  /organization/{organization_id}/role:
    get:
      description: Returns every role defined for an organization.
      parameters:
      - description: Organization ID
        in: path
        name: organization_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/RoleOutput'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - BearerAuth: []
      summary: List roles
      tags:
      - Role
    post:
      consumes:
      - application/json
      description: Creates a new role for an organization.
      parameters:
      - description: Organization ID
        in: path
        name: organization_id
        required: true
        type: string
      - description: Create role request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/CreateRoleInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/CreateRoleOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - BearerAuth: []
      summary: Create role
      tags:
      - Role
  /organization/{organization_id}/role/{role_id}:
    delete:
      parameters:
      - description: Organization ID
        in: path
        name: organization_id
        required: true
        type: string
      - description: Role ID
        in: path
        name: role_id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - BearerAuth: []
      summary: Delete role
      tags:
      - Role
    patch:
      consumes:
      - application/json
      parameters:
      - description: Organization ID
        in: path
        name: organization_id
        required: true
        type: string
      - description: Role ID
        in: path
        name: role_id
        required: true
        type: string
      - description: Update role request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateRoleInput'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - BearerAuth: []
      summary: Update role
      tags:
      - Role
  /permission:
    get:
      description: Returns all permissions grouped by category.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/ListPermissionsOutput'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - BearerAuth: []
      summary: List permissions
      tags:
      - Authorization
  /user/me:
    get:
      description: Returns the authenticated user's profile.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/GetMeOutput'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - User
  /user/me/profile:
    get:
      description: Returns the authenticated user's profile information.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/GetMyProfileOutput'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - BearerAuth: []
      summary: Get current user's profile
      tags:
      - User
    put:
      consumes:
      - application/json
      description: Creates or updates the authenticated user's profile.
      parameters:
      - description: Profile
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/SaveMyProfileInput'
      responses:
        "204":
          description: Profile updated successfully
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Error'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Error'
      security:
      - BearerAuth: []
      summary: Create or update current user's profile
      tags:
      - User
securityDefinitions:
  BearerAuth:
    description: Enter the JWT token with the `Bearer ` prefix
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
