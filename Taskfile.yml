version: "3"

dotenv:
  - .env

vars:
  APP_NAME: TrueFlow
  BIN_DIR: bin
  OUT: "{{.BIN_DIR}}/{{.APP_NAME}}"
  SWAGGER_DOCS_DIR: docs/swagger
  MAIN_PATH: cmd/server/main.go
  DAO_GEN_PATH: cmd/gorm_gen/main.go
  DB_URL: 'postgres://{{.DB_POSTGRES_USER}}:{{.DB_POSTGRES_PASSWORD}}@{{.DB_POSTGRES_HOST}}:{{.DB_POSTGRES_PORT}}/{{.DB_POSTGRES_DB}}?sslmode=disable'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # ---------------------------------------------------------------------------
  # Development
  # ---------------------------------------------------------------------------

  run:
    desc: Run the application
    cmds:
      - go run {{.MAIN_PATH}}

  watch:
    desc: Run with live reload
    cmds:
      - air -c .air.toml

  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------

  build:
    desc: Build the application
    cmds:
      - go build -o {{.OUT}} {{.MAIN_PATH}}

  # ---------------------------------------------------------------------------
  # Quality
  # ---------------------------------------------------------------------------

  fmt:
    desc: Format source code
    cmds:
      - gofmt -s -w .

  lint:
    desc: Run linters
    cmds:
      - golangci-lint run ./...

  lint-fix:
    desc: Automatically fix lint issues
    cmds:
      - golangci-lint run --fix ./...

  check:
    desc: Run formatting, linting and tests
    deps:
      - fmt
      - test
      - lint

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------

  test:
    desc: Run tests
    cmds:
      - go test -race -timeout=60s ./...

  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------

  mig:up:
    desc: Apply all database migrations
    cmds:
      - goose -dir ./migrations postgres "{{.DB_URL}}" up

  mig:down:
    desc: Roll back the last migration
    cmds:
      - goose -dir ./migrations postgres "{{.DB_URL}}" down

  mig:new:
    desc: Create a new migration (task migrate-new NAME=create_users)
    requires:
      vars:
        - NAME
    cmds:
      - goose -dir ./migrations create {{.NAME}} sql

  mig:status:
    desc: Show migration status
    cmds:
      - goose -dir ./migrations postgres "{{.DB_URL}}" status

  # ---------------------------------------------------------------------------
  # Models
  # ---------------------------------------------------------------------------

  gen:
    desc: Generates dao
    cmds:
      - go run {{.DAO_GEN_PATH}}

  # ---------------------------------------------------------------------------
  # Documentation
  # ---------------------------------------------------------------------------

  swag:
    desc: Generate Swagger documentation
    cmds:
      - |
        swag init \
          -g {{.MAIN_PATH}} \
          -o {{.SWAGGER_DOCS_DIR}} \
          --parseDependency \
          --parseInternal

  # ---------------------------------------------------------------------------
  # Dependencies
  # ---------------------------------------------------------------------------

  deps:
    desc: Tidy and verify Go modules
    cmds:
      - go mod tidy
      - go mod verify
