name: TrueFlow

services:
  postgres:
    image: postgres:16.14-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_POSTGRES_DB}
    ports:
      - "${DB_POSTGRES_PORT}:5432"
    volumes:
      - true_flow_pg:/var/lib/postgresql/data

  redis:
    image: redis:8.8-alpine3.23
    restart: unless-stopped
    command: [ "redis-server", "--requirepass", "${CACHE_REDIS_PASSWORD}" ]
    ports:
      - "${CACHE_REDIS_PORT}:6379"
    volumes:
      - true_flow_redis:/data

volumes:
  true_flow_pg:
  true_flow_redis:
